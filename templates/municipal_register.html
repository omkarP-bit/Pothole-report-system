{% extends "base.html" %}

{% block title %}Municipal Staff Registration - Pothole Reporting System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Municipal Staff Registration</h4>
            </div>
            <div class="card-body">
                <form id="municipalRegisterForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register as Staff</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="/municipal-login" class="text-muted">Already have an account? Login</a><br>
                    <a href="/" class="text-muted">Back to Public Portal</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('municipalRegisterForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    if (password !== confirmPassword) {
        showAlert('Passwords do not match!', 'danger');
        return;
    }
    
    const formData = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: password
    };
    
    try {
        const response = await fetch('/municipal-register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            showAlert('Staff account created successfully! You can now login.', 'success');
            setTimeout(() => {
                window.location.href = '/municipal-login';
            }, 2000);
        } else {
            showAlert(result.error, 'danger');
        }
    } catch (error) {
        showAlert('Registration failed. Please try again.', 'danger');
    }
});
</script>
{% endblock %}
