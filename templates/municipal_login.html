{% extends "base.html" %}

{% block title %}Municipal Login - Pothole Reporting System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Municipal Staff Login</h4>
            </div>
            <div class="card-body">
                <form id="municipalLoginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="/municipal-register" class="text-muted">Need an account? Register as Staff</a><br>
                    <a href="/" class="text-muted">Back to Public Portal</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('municipalLoginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };
    
    try {
        const response = await fetch('/municipal-login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            if (result.is_staff) {
                window.location.href = '/municipal-dashboard';
            } else {
                showAlert('Access denied. Staff privileges required.', 'danger');
            }
        } else {
            showAlert(result.error, 'danger');
        }
    } catch (error) {
        showAlert('Login failed. Please try again.', 'danger');
    }
});
</script>
{% endblock %}
